<!doctype html>

<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="icon" href="resources/favicon.ico" />
    <link href="resources/bootstrap/bootstrap.min.css" rel="stylesheet" />

    <script src="resources/bootstrap/bootstrap.bundle.min.js" defer></script>
    <script src="resources/exceljs/exceljs.min.js" defer></script>
    <script src="resources/dayjs/dayjs.min.js" defer></script>
    <script src="resources/dayjs/customParseFormat.js" defer></script>
    <script src="resources/dayjs/isBetween.js" defer></script>
    <script src="resources/main.js" defer></script>

    <title>Abnormal punch check</title>
  </head>

  <body>
    <div class="container-fluid">
      <div class="row mt-3">
        <div class="col offset-sm-3 col-sm-6">
          <h1>打卡異常檢查</h1>
        </div>
      </div>

      <div class="row mt-5">
        <div class="col offset-sm-2 col-sm-8 offset-md-3 col-md-6">
          <form id="workForm">
            <div class="mb-3">
              <label
                class="form-label"
                for="c5158cec-d051-46ce-a3fe-6c41011cde67"
                >打卡Excel</label
              >
              <input
                id="c5158cec-d051-46ce-a3fe-6c41011cde67"
                class="form-control"
                type="file"
                name="excel"
                accept=".xlsx, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
              />
              <div class="invalid-feedback">檔案處理發生問題</div>
            </div>

            <div class="d-flex gap-3 justify-content-center">
              <button
                class="btn btn-secondary"
                type="button"
                name="check"
                disabled
              >
                <span
                  class="spinner-border spinner-border-sm me-1 d-none"
                  data-spinner
                ></span>
                <span>檢查是否請假</span>
              </button>
              <button
                class="btn btn-primary"
                type="button"
                name="download"
                disabled
              >
                下載檢查結果
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
